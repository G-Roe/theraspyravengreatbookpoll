        function getInitials(name) { return name.split(' ').map(n => n[0]).slice(0, 2).join('').toUpperCase(); }

        function renderShelfLayout(items) {
            const shelf = document.getElementById('gallery-shelf');
            shelf.innerHTML = '';

            items.forEach(record => {
                const card = document.createElement('div');
                card.className = "w-full md:w-[calc(50%-12px)] xl:w-[calc(33.33%-16px)] flex flex-col p-5 rounded bg-[#e8d9b8]/20 border border-[#8b7355]/30 shadow-sm transition duration-150 hover:bg-[#e8d9b8]/30 shrink-0 mb-2";

                // Author Header
                const header = document.createElement('div');
                header.className = "flex flex-row gap-4 items-center border-b border-[#8b7355]/20 pb-4 w-full";
                
                const authorAvatar = document.createElement('div');
                authorAvatar.className = "relative w-14 h-14 rounded-full border border-[#8b7355]/50 overflow-hidden shrink-0 bg-[#e8d9b8] flex items-center justify-center shadow-inner";
                
                if (record.author_image && record.author_image !== 'None' && record.author_image !== '') {
                    const img = document.createElement('img');
                    img.className = "absolute inset-0 w-full h-full object-cover filter sepia-[0.25]";
                    img.src = record.author_image;
                    img.alt = record.author;
                    img.onerror = function() { this.style.display = 'none'; }; // Fallback
                    authorAvatar.appendChild(img);
                }
                
                const initialText = document.createElement('div');
                initialText.className = "font-bold text-sm text-[#8b3a2a]";
                initialText.innerText = getInitials(record.author);
                authorAvatar.appendChild(initialText);
                header.appendChild(authorAvatar);
                
                header.innerHTML += `<div class="flex flex-col"><div class="serif-font text-base font-bold text-[#1a1208]">${record.author}</div><div class="text-[11px] uppercase font-bold text-[#8b7355]">${record.books.length} Nominations</div></div>`;
                card.appendChild(header);

                // Books
                const scroller = document.createElement('div');
                scroller.className = "flex flex-row gap-4 items-start w-full overflow-x-auto books-scrollbar pt-4 pb-2";

                record.books.forEach(book => {
                    const wrapper = document.createElement('div');
                    wrapper.className = "flex flex-col items-center text-center shrink-0 w-24";
                    
                    const bookCard = document.createElement('div');
                    // Added 'group' and 'cursor-pointer' to coordinate the hover trigger
                    bookCard.className = "relative w-24 h-36 rounded bg-[#f5edd8] border border-[#8b7355]/40 overflow-hidden group cursor-pointer";
                    
                    if (book.cover_url && book.cover_url !== 'None' && book.cover_url !== '') {
                        const bImg = document.createElement('img');
                        bImg.className = "w-full h-full object-cover";
                        bImg.src = book.cover_url;
                        bImg.alt = book.title;
                        bImg.onerror = function() { this.style.display = 'none'; }; // Fallback strategy
                        bookCard.appendChild(bImg);
                    }
                    
                    // Add Title Overlay Layer
                    const textOverlay = document.createElement('div');
                    textOverlay.className = "absolute inset-0 bg-[#1a1208]/90 flex items-center justify-center p-2 opacity-0 group-hover:opacity-100 transition-opacity duration-200 select-none text-center pointer-events-none";
                    textOverlay.innerHTML = `<span class="serif-font text-[#f5edd8] font-bold text-[11px] leading-tight tracking-normal overflow-hidden max-h-full">${book.title}</span>`;
                    bookCard.appendChild(textOverlay);
                    
                    wrapper.appendChild(bookCard);
                    wrapper.innerHTML += `<div class="mt-2 font-mono font-bold text-[11px] text-[#8b3a2a] bg-[#e8d9b8]/60 px-1.5 py-0.5 rounded border border-[#8b7355]/20">${book.votes} vote(s)</div>`;
                    scroller.appendChild(wrapper);
                });
                card.appendChild(scroller);
                shelf.appendChild(card);
            });
        }
        renderShelfLayout(libraryPayload);
    </script>
